<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KB Quality</title>
<link rel="stylesheet" href="ui-tokens.css">
<link rel="stylesheet" href="ux-components.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:1rem}
nav{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
nav a{padding:.4rem .8rem;border-radius:.3rem;text-decoration:none;color:#94a3b8;font-size:.75rem;border:1px solid #334155}
nav a:hover,nav a.active{background:#334155;color:#e2e8f0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.card{background:#1e293b;border-radius:.5rem;padding:1rem;border:1px solid #334155}
.card h3{font-size:.7rem;color:#94a3b8;text-transform:uppercase;margin-bottom:.3rem}
.card .val{font-size:1.6rem;font-weight:700;color:#38bdf8}
.confidence-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;margin-top:.8rem}
.confidence-grid .stat{text-align:center}
.confidence-grid .stat .num{font-size:1.4rem;font-weight:700}
.confidence-grid .stat .label{font-size:.65rem;color:#94a3b8;margin-top:.2rem}
.section{margin-bottom:1.5rem}
.section h2{font-size:.9rem;margin-bottom:.6rem}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{text-align:left;padding:.4rem .5rem;background:#334155;border-bottom:1px solid #475569;font-size:.65rem;color:#94a3b8}
td{padding:.4rem .5rem;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b}
.score-bar{height:6px;border-radius:3px;background:#334155}
.score-fill{height:100%;border-radius:3px}
.chart-wrap{background:#1e293b;border-radius:.5rem;padding:.8rem;border:1px solid #334155}
canvas{width:100%;max-width:100%}
</style>
</head>
<body>
<script src="nav-bar.js"></script>
<nav>
<a href="/">Graph</a>
<a href="/dashboard">Dashboard</a>
<a href="/tags">Tags</a>
<a href="/quality" class="active">Quality</a>
<a href="/analytics">Analytics</a>
</nav>
<div class="grid-2">
  <div class="chart-wrap" id="histogram-wrap"><canvas id="dist" width="400" height="160"></canvas></div>
  <div class="chart-wrap" id="confidence-wrap">
    <h3 style="font-size:.75rem;color:#94a3b8;margin-bottom:.6rem;">Confidence</h3>
    <div class="confidence-grid" id="confidence-stats">
      <div class="stat"><div class="num" id="conf-avg" style="color:#38bdf8;">—</div><div class="label">Average</div></div>
      <div class="stat"><div class="num" id="conf-high" style="color:#22c55e;">—</div><div class="label">High</div></div>
      <div class="stat"><div class="num" id="conf-low" style="color:#ef4444;">—</div><div class="label">Low</div></div>
    </div>
  </div>
</div>
<div class="section"><h2>Low Quality Entries</h2>
<table><thead><tr><th>ID</th><th>Type</th><th>Summary</th><th>Score</th><th>Bar</th></tr></thead>
<tbody id="low-table"></tbody></table></div>
<div class="section"><h2>Most Cited Entries</h2>
<table><thead><tr><th>ID</th><th>Summary</th><th>Citations</th></tr></thead>
<tbody id="cited-table"></tbody></table></div>
<script src="quality.js"></script>
<script type="module">
import{initTour}from"./modules/tour.js";
import{initTooltips}from"./modules/tooltips.js";
import{initEmptyStates}from"./modules/empty-states.js";
import{initHelpPanel}from"./modules/help-panel.js";
const p="quality";initTour(p);initTooltips(p);initEmptyStates(p);initHelpPanel(p);
</script>
</body>
</html>

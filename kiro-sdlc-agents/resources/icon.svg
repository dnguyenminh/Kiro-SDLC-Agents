<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="white" stroke-width="0.5" fill="none">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>
  <!-- Orbital rings -->
  <ellipse cx="64" cy="64" rx="38" ry="16" fill="none" stroke="url(#orbitGrad)" stroke-width="2" opacity="0.7" transform="rotate(-25 64 64)"/>
  <ellipse cx="64" cy="64" rx="38" ry="16" fill="none" stroke="url(#orbitGrad)" stroke-width="2" opacity="0.5" transform="rotate(35 64 64)"/>
  <ellipse cx="64" cy="64" rx="38" ry="16" fill="none" stroke="url(#orbitGrad)" stroke-width="2" opacity="0.3" transform="rotate(90 64 64)"/>
  <!-- Central core (brain/hub) -->
  <circle cx="64" cy="64" r="18" fill="url(#coreGrad)" opacity="0.95"/>
  <circle cx="64" cy="64" r="14" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Neural connections inside core -->
  <g stroke="white" stroke-width="1.2" opacity="0.8" fill="none">
    <path d="M58 58 L64 64 L70 58"/>
    <path d="M58 70 L64 64 L70 70"/>
    <path d="M54 64 L64 64 L74 64"/>
  </g>
  <!-- Agent nodes on orbits -->
  <circle cx="34" cy="48" r="6" fill="#34d399" stroke="white" stroke-width="1.5"/>
  <text x="34" y="51" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">B</text>
  <circle cx="94" cy="48" r="6" fill="#60a5fa" stroke="white" stroke-width="1.5"/>
  <text x="94" y="51" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">S</text>
  <circle cx="34" cy="80" r="6" fill="#f472b6" stroke="white" stroke-width="1.5"/>
  <text x="34" y="83" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Q</text>
  <circle cx="94" cy="80" r="6" fill="#fb923c" stroke="white" stroke-width="1.5"/>
  <text x="94" y="83" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">D</text>
  <circle cx="64" cy="34" r="6" fill="#a78bfa" stroke="white" stroke-width="1.5"/>
  <text x="64" y="37" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">A</text>
  <circle cx="64" cy="94" r="6" fill="#2dd4bf" stroke="white" stroke-width="1.5"/>
  <text x="64" y="97" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">O</text>
  <!-- Sparkle accents -->
  <g fill="white" opacity="0.9">
    <polygon points="18,20 19.5,23 23,23 20,25.5 21,29 18,27 15,29 16,25.5 13,23 16.5,23"/>
    <polygon points="108,98 109.2,100 112,100 110,101.5 110.8,104 108,102.5 105.2,104 106,101.5 104,100 106.8,100" transform="scale(0.8) translate(15,12)"/>
  </g>
  <!-- Bottom label -->
  <text x="64" y="118" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.9" font-weight="bold" letter-spacing="1">SDLC AGENTS</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- Orbital ring 1 -->
  <ellipse cx="12" cy="12" rx="9.5" ry="3.8" transform="rotate(-30 12 12)"/>
  <!-- Orbital ring 2 -->
  <ellipse cx="12" cy="12" rx="9.5" ry="3.8" transform="rotate(30 12 12)"/>
  <!-- Orbital ring 3 (vertical) -->
  <ellipse cx="12" cy="12" rx="9.5" ry="3.8" transform="rotate(90 12 12)"/>
  <!-- Central core -->
  <circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none" opacity="0.9"/>
  <!-- Agent nodes on orbits -->
  <circle cx="4.5" cy="8" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="19.5" cy="8" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="4.5" cy="16" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="19.5" cy="16" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="12" cy="3" r="1.8" fill="currentColor" stroke="none"/>
  <circle cx="12" cy="21" r="1.8" fill="currentColor" stroke="none"/>
</svg>

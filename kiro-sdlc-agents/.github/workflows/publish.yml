name: Publish Extension

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - vscode-only
          - openvsx-only

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --no-dependencies
        
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: '*.vsix'

  publish-vscode:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'vscode-only'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'openvsx-only'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to Open VSX (Kiro IDE)
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}

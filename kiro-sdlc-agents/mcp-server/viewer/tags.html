<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KB Tags</title>
<link rel="stylesheet" href="ui-tokens.css">
<link rel="stylesheet" href="ux-components.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:1rem}
nav{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
nav a{padding:.4rem .8rem;border-radius:.3rem;text-decoration:none;color:#94a3b8;font-size:.75rem;border:1px solid #334155}
nav a:hover,nav a.active{background:#334155;color:#e2e8f0}
.section{margin-bottom:1.5rem}
.section h2{font-size:.9rem;margin-bottom:.6rem}
.cloud{display:flex;flex-wrap:wrap;gap:.4rem;padding:.8rem;background:#1e293b;border-radius:.5rem;border:1px solid #334155}
.tag{padding:.3rem .6rem;border-radius:1rem;cursor:pointer;transition:all .2s;border:1px solid #475569}
.tag:hover{background:#475569;transform:scale(1.05)}
.tree{background:#1e293b;border-radius:.5rem;padding:.8rem;border:1px solid #334155;max-height:300px;overflow-y:auto}
.tree ul{list-style:none;padding-left:1rem}
.tree li{font-size:.75rem;padding:.2rem 0}
.tree .parent{font-weight:600;color:#38bdf8}
.results{margin-top:.8rem}
.results .entry{padding:.5rem;margin-bottom:.3rem;background:#1e293b;border-radius:.3rem;font-size:.75rem;border-left:3px solid #38bdf8}
.results .entry .type{font-size:.6rem;color:#a78bfa;font-weight:700}
#search-tag{padding:.4rem .7rem;border-radius:.3rem;border:1px solid #475569;background:#1e293b;color:#e2e8f0;font-size:.75rem;width:250px;margin-bottom:.6rem}
.ac-wrap{position:relative;display:inline-block}
.ac-list{position:absolute;top:100%;left:0;width:250px;background:#1e293b;border:1px solid #475569;border-radius:.3rem;max-height:180px;overflow-y:auto;z-index:10;display:none}
.ac-list.show{display:block}
.ac-item{padding:.35rem .7rem;font-size:.75rem;cursor:pointer}
.ac-item:hover,.ac-item.active{background:#334155}
</style>
</head>
<body>
<nav>
<a href="/">Graph</a>
<a href="/dashboard">Dashboard</a>
<a href="/tags" class="active">Tags</a>
<a href="/quality">Quality</a>
<a href="/analytics">Analytics</a>
</nav>
<div class="section"><h2>Popular Tags</h2>
<div class="cloud" id="cloud"></div></div>
<div class="section"><h2>Tag Taxonomy</h2>
<div class="tree" id="tree"></div></div>
<div class="section"><h2>Search by Tag</h2>
<div class="ac-wrap"><input type="text" id="search-tag" placeholder="Enter tag name..." autocomplete="off">
<div class="ac-list" id="ac-list"></div></div>
<div class="results" id="results"></div></div>
<script src="tags.js"></script>
<script type="module">
import{initTour}from"./modules/tour.js";
import{initTooltips}from"./modules/tooltips.js";
import{initEmptyStates}from"./modules/empty-states.js";
import{initHelpPanel}from"./modules/help-panel.js";
const p="tags";initTour(p);initTooltips(p);initEmptyStates(p);initHelpPanel(p);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KB Dashboard</title>
<link rel="stylesheet" href="ui-tokens.css">
<link rel="stylesheet" href="ux-components.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:1rem}
nav{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
nav a{padding:.4rem .8rem;border-radius:.3rem;text-decoration:none;color:#94a3b8;font-size:.75rem;border:1px solid #334155}
nav a:hover,nav a.active{background:#334155;color:#e2e8f0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.8rem;margin-bottom:1.2rem}
.card{background:#1e293b;border-radius:.5rem;padding:1rem;border:1px solid #334155}
.card h3{font-size:.7rem;color:#94a3b8;text-transform:uppercase;margin-bottom:.4rem}
.card .val{font-size:1.8rem;font-weight:700;color:#38bdf8}
.card .sub{font-size:.65rem;color:#64748b;margin-top:.2rem}
.gauge{width:120px;height:120px;margin:0 auto 1rem}
.gauge svg{width:100%;height:100%}
.recs{list-style:none}
.recs li{padding:.5rem .7rem;margin-bottom:.4rem;background:#1e293b;border-radius:.3rem;font-size:.75rem;border-left:3px solid #f59e0b}
.recs li.high{border-left-color:#ef4444}
.recs li.low{border-left-color:#22c55e}
.section{margin-bottom:1.5rem}
.section h2{font-size:.9rem;margin-bottom:.6rem;color:#e2e8f0}
.trend{display:flex;gap:1rem;flex-wrap:wrap}
.trend canvas{background:#1e293b;border-radius:.4rem;border:1px solid #334155}
</style>
</head>
<body>
<nav>
<a href="/">Graph</a>
<a href="/dashboard" class="active">Dashboard</a>
<a href="/tags">Tags</a>
<a href="/quality">Quality</a>
<a href="/analytics">Analytics</a>
</nav>
<div class="section"><h2>Health Score</h2>
<div class="gauge"><svg viewBox="0 0 120 120" id="gauge"></svg></div>
<div id="health-label" style="text-align:center;font-size:.8rem"></div></div>
<div class="grid" id="metrics"></div>
<div class="section"><h2>Recommendations</h2>
<ul class="recs" id="recs"></ul></div>
<div class="section"><h2>Due Reviews</h2>
<table style="width:100%;border-collapse:collapse;font-size:.75rem">
<thead><tr>
<th style="text-align:left;padding:.4rem;background:#334155;font-size:.65rem;color:#94a3b8">ID</th>
<th style="text-align:left;padding:.4rem;background:#334155;font-size:.65rem;color:#94a3b8">Summary</th>
<th style="text-align:left;padding:.4rem;background:#334155;font-size:.65rem;color:#94a3b8">Last Reviewed</th>
<th style="text-align:left;padding:.4rem;background:#334155;font-size:.65rem;color:#94a3b8">Overdue</th>
</tr></thead><tbody id="reminders"></tbody></table></div>
<div class="section"><h2>Trends (7 days)</h2>
<div class="trend">
<canvas id="chart-search" width="300" height="140"></canvas>
<canvas id="chart-ingest" width="300" height="140"></canvas>
</div></div>
<script src="dashboard.js"></script>
<script type="module">
import{initTour}from"./modules/tour.js";
import{initTooltips}from"./modules/tooltips.js";
import{initEmptyStates}from"./modules/empty-states.js";
import{initHelpPanel}from"./modules/help-panel.js";
const p="dashboard";initTour(p);initTooltips(p);initEmptyStates(p);initHelpPanel(p);
</script>
</body>
</html>

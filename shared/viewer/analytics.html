<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KB Analytics</title>
<link rel="stylesheet" href="ui-tokens.css">
<link rel="stylesheet" href="ux-components.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui;background:#0f172a;color:#e2e8f0;padding:1rem}
nav{display:flex;gap:.5rem;margin-bottom:1.2rem;flex-wrap:wrap}
nav a{padding:.4rem .8rem;border-radius:.3rem;text-decoration:none;color:#94a3b8;font-size:.75rem;border:1px solid #334155}
nav a:hover,nav a.active{background:#334155;color:#e2e8f0}
.section{margin-bottom:1.5rem}
.section h2{font-size:.9rem;margin-bottom:.6rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.two-col{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:.75rem}
th{text-align:left;padding:.4rem .5rem;background:#334155;border-bottom:1px solid #475569;font-size:.65rem;color:#94a3b8}
td{padding:.4rem .5rem;border-bottom:1px solid #1e293b}
tr:hover{background:#1e293b}
.badge{display:inline-block;padding:.1rem .4rem;border-radius:1rem;font-size:.6rem;font-weight:600}
.badge-warn{background:#854d0e;color:#fef08a}
.badge-info{background:#1e3a5f;color:#7dd3fc}
.chart-wrap{background:#1e293b;border-radius:.5rem;padding:.8rem;border:1px solid #334155;margin-bottom:1rem}
canvas{width:100%;max-width:600px}
.empty{font-size:.75rem;color:#64748b;padding:.5rem}
</style>
</head>
<body>
<nav>
<a href="/">Graph</a>
<a href="/dashboard">Dashboard</a>
<a href="/tags">Tags</a>
<a href="/quality">Quality</a>
<a href="/analytics" class="active">Analytics</a>
</nav>
<div class="section"><h2>Search Volume Trend</h2>
<div class="chart-wrap"><canvas id="trend" height="120"></canvas></div></div>
<div class="two-col">
<div class="section"><h2>Popular Queries</h2>
<table><thead><tr><th>Query</th><th>Count</th><th>Avg Results</th></tr></thead>
<tbody id="popular"></tbody></table></div>
<div class="section"><h2>Zero-Result Queries (Content Gaps)</h2>
<table><thead><tr><th>Query</th><th>Count</th><th>Status</th></tr></thead>
<tbody id="gaps"></tbody></table></div>
</div>
<script src="analytics.js"></script>
<script type="module">
import{initTour}from"./modules/tour.js";
import{initTooltips}from"./modules/tooltips.js";
import{initEmptyStates}from"./modules/empty-states.js";
import{initHelpPanel}from"./modules/help-panel.js";
const p="analytics";initTour(p);initTooltips(p);initEmptyStates(p);initHelpPanel(p);
</script>
</body>
</html>

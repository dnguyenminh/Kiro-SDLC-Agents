<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SDLC Memory Viewer</title>
<link rel="stylesheet" href="viewer.css">
<link rel="stylesheet" href="ui-tokens.css">
<link rel="stylesheet" href="ux-components.css">
<style>
/* Graph-specific layout */
#graph3d{position:absolute!important;top:0;left:0;right:0;bottom:0;z-index:0}
#graph-toolbar{position:absolute;top:8px;left:8px;display:flex;gap:6px;z-index:200;align-items:center;transform:translateZ(0)}
#graph-toolbar h1{font-size:.85rem;font-weight:600;white-space:nowrap}
#graph-toolbar input{padding:4px 8px;border-radius:4px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;font-size:.72rem;width:200px}
#graph-toolbar button,#graph-toolbar select{padding:4px 8px;border-radius:4px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:.68rem}
#graph-toolbar button:hover{background:#334155}
#graph-detail{width:300px;min-width:300px;overflow-y:auto;padding:8px;background:rgba(30,41,59,.95);border-left:1px solid #334155;z-index:5}
#minimap{position:absolute;bottom:8px;left:8px;width:140px;height:110px;background:rgba(15,23,42,.9);border:1px solid #475569;border-radius:4px;z-index:200;transform:translateZ(0)}
#minimap canvas{width:100%;height:100%}
#legend{position:absolute!important;bottom:8px!important;top:auto!important;left:160px;background:rgba(30,41,59,.9);padding:6px;border-radius:4px;font-size:.6rem;z-index:200;transform:translateZ(0)}
#legend div{display:flex;align-items:center;gap:4px;margin-bottom:2px}
#legend span{display:inline-block;width:9px;height:9px;border-radius:50%}
/* Sessions */
#sess-detail{display:none;flex-direction:column;border-top:1px solid #334155;padding:0;height:100%;overflow:hidden}
.timeline-controls{display:flex;gap:6px;align-items:center;padding:8px;background:#1e293b;border-bottom:1px solid #334155;position:sticky;top:0;z-index:5}
.timeline-controls button{padding:3px 8px;border-radius:3px;border:1px solid #475569;background:#334155;color:#e2e8f0;cursor:pointer;font-size:.7rem}
.timeline-controls button:hover{background:#475569}
#timeline-track{flex:1;height:6px;background:#334155;border-radius:3px;cursor:pointer;position:relative}
#timeline-bar{height:100%;background:#38bdf8;border-radius:3px;transition:width .2s}
#timeline-events{flex:1;overflow-y:auto;padding:8px}
/* Stream */
.stream-item{padding:8px;border-bottom:1px solid #1e293b;animation:fadeIn .3s}
.stream-time{font-size:.6rem;opacity:.5;margin-bottom:2px}
#stream-indicator{width:8px;height:8px;border-radius:50%;background:#334155;transition:background .3s}
#stream-indicator.flash{background:#34d399}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
/* Browser detail */
#br-detail{display:none;position:absolute;top:0;right:0;width:320px;height:100%;background:rgba(30,41,59,.98);border-left:1px solid #334155;padding:10px;overflow-y:auto;z-index:15}
#br-load-more{text-align:center;padding:8px}
#br-load-more button{padding:6px 16px;border-radius:4px;border:1px solid #475569;background:#334155;color:#e2e8f0;cursor:pointer;font-size:.7rem}
</style></head><body>
<div id="app">
<div class="tab-bar">
  <button class="tab-btn active" data-tab="graph" onclick="switchTab('graph',this)">🧠 Graph</button>
  <button class="tab-btn" data-tab="sessions" onclick="switchTab('sessions',this)">📋 Sessions</button>
  <button class="tab-btn" data-tab="browser" onclick="switchTab('browser',this)">🔍 Browser</button>
  <button class="tab-btn" data-tab="stream" onclick="switchTab('stream',this)">⚡ Stream</button>
  <span style="border-left:1px solid #475569;height:20px;margin:0 4px"></span>
  <a class="tab-btn" href="dashboard" style="text-decoration:none">📊 Dashboard</a>
  <a class="tab-btn" href="tags" style="text-decoration:none">🏷️ Tags</a>
  <a class="tab-btn" href="quality" style="text-decoration:none">📈 Quality</a>
  <a class="tab-btn" href="analytics" style="text-decoration:none">🔎 Analytics</a>
  <span id="workspace-info" style="margin-left:auto;font-size:.6rem;opacity:.5;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title=""></span>
</div>

<!-- Graph Tab -->
<div class="tab-panel active" id="panel-graph" style="flex-direction:row;position:relative">
  <div id="graph-wrap" style="flex:1;position:relative;overflow:hidden">
    <div id="graph3d"></div>
    <div id="graph-toolbar"><h1>🧠 3D Graph</h1>
      <input type="text" id="graph-search" placeholder="Search..." onkeyup="graphSearchKey(event)">
      <button onclick="graphFit()" title="Fit all">⊞ Fit</button>
      <button onclick="graphReset()" title="Reset">↺</button>
      <select id="cs" onchange="graphJumpCluster(this.value)"><option value="">Jump to...</option></select>
    </div>
    <div id="minimap"><canvas id="mc" width="180" height="140"></canvas></div>
    <div id="legend">
      <div><span style="background:#34d399"></span>REQUIREMENT</div>
      <div><span style="background:#a78bfa"></span>ARCHITECTURE</div>
      <div><span style="background:#e2e8f0"></span>CODE_ENTITY</div>
      <div><span style="background:#f472b6"></span>DECISION</div>
      <div><span style="background:#fb923c"></span>ERROR_PATTERN</div>
      <div><span style="background:#facc15"></span>PROCEDURE</div>
      <div><span style="background:#f87171"></span>LESSON_LEARNED</div>
      <div><span style="background:#2dd4bf"></span>API_DESIGN</div>
      <div><span style="background:#38bdf8"></span>CONTEXT</div>
    </div>
  </div>
  <div id="graph-detail">
    <div class="stats" id="graph-stats" style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px"></div>
    <h3 style="font-size:.75rem;margin-bottom:4px;opacity:.7">Recent Entries</h3>
    <div id="graph-recent" style="font-size:.65rem;opacity:.5">Loading...</div>
    <div id="graph-node-detail" style="margin-top:8px"></div>
  </div>
</div>

<!-- Sessions Tab -->
<div class="tab-panel" id="panel-sessions" style="flex-direction:column">
  <div class="filter-bar">
    <input id="sess-agent" placeholder="Agent name..." onkeyup="if(event.key==='Enter')loadSessions()">
    <select id="sess-status" onchange="loadSessions()"><option value="">All status</option><option value="active">Active</option><option value="ended">Ended</option></select>
    <button onclick="loadSessions()">Filter</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="entry-list" id="sess-list" style="flex:1"></div>
    <div id="sess-detail" style="flex:1;display:none;flex-direction:column;border-left:1px solid #334155;padding:8px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <b style="font-size:.75rem">Session: <span id="sess-detail-id"></span></b>
        <button onclick="closeReplay()" style="border:none;background:none;color:#94a3b8;cursor:pointer">✕</button>
      </div>
      <div class="timeline-controls">
        <button onclick="replayStep(-1)">⏮</button>
        <button id="replay-play-btn" onclick="replayPlay()">▶</button>
        <button onclick="replayStep(1)">⏭</button>
        <select id="replay-speed" onchange="if(replayPlaying){replayPause();replayPlay()}" style="padding:2px 4px;border-radius:3px;border:1px solid #475569;background:#334155;color:#e2e8f0;font-size:.6rem">
          <option value="2000">0.5x</option><option value="1000" selected>1x</option><option value="500">2x</option><option value="250">4x</option>
        </select>
        <div id="timeline-track" onclick="replayScrub(event)"><div id="timeline-bar" style="width:0"></div></div>
        <span id="timeline-pos" style="font-size:.6rem;min-width:40px;text-align:right">0/0</span>
        <button id="export-btn" onclick="exportSession()" style="margin-left:4px">📋 Export</button>
      </div>
      <div id="timeline-events" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>
</div>

<!-- Browser Tab -->
<div class="tab-panel" id="panel-browser" style="flex-direction:column;position:relative">
  <div class="filter-bar">
    <select id="br-tier" onchange="browserFilterChange()"><option value="">All tiers</option><option value="WORKING">WORKING</option><option value="EPISODIC">EPISODIC</option><option value="SEMANTIC">SEMANTIC</option><option value="PROCEDURAL">PROCEDURAL</option></select>
    <select id="br-type" onchange="browserFilterChange()"><option value="">All types</option><option value="CONTEXT">CONTEXT</option><option value="DECISION">DECISION</option><option value="ERROR_PATTERN">ERROR_PATTERN</option><option value="ARCHITECTURE">ARCHITECTURE</option><option value="REQUIREMENT">REQUIREMENT</option><option value="PROCEDURE">PROCEDURE</option><option value="LESSON_LEARNED">LESSON_LEARNED</option><option value="CODE_ENTITY">CODE_ENTITY</option><option value="API_DESIGN">API_DESIGN</option></select>
    <select id="br-sort" onchange="browserFilterChange()"><option value="created_at">Newest</option><option value="access_count">Most accessed</option><option value="confidence">Confidence</option></select>
    <input id="br-search" placeholder="Full-text search..." onkeyup="browserSearch(event)">
  </div>
  <div class="entry-list" id="br-list"></div>
  <div id="br-load-more"><button onclick="browserLoadMore()">Load more...</button></div>
  <div id="br-detail"></div>
</div>

<!-- Stream Tab -->
<div class="tab-panel" id="panel-stream" style="flex-direction:column;position:relative">
  <div class="filter-bar">
    <div id="stream-indicator"></div>
    <span style="font-size:.7rem;opacity:.7">Live Operations</span>
    <button id="stream-pause-btn" onclick="toggleStreamPause()">⏸ Pause</button>
    <button id="stream-sort-btn" onclick="toggleStreamSort()">↑ Oldest first</button>
    <button onclick="clearStream()">Clear</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="entry-list" id="stream-list" style="flex:1;flex-direction:column-reverse"></div>
    <div id="stream-detail" style="display:none;width:320px;border-left:1px solid #334155;padding:10px;overflow-y:auto;background:rgba(30,41,59,.98)">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><b style="font-size:.75rem">Event Detail</b><span onclick="closeStreamDetail()" style="cursor:pointer;opacity:.6">✕</span></div>
      <div id="stream-detail-content"></div>
    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
<script>
/* Shared utilities */
const API = 'api/memory';
function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;').substring(0, 200); }
function formatTime(t) { if (!t) return ''; try { return new Date(t.replace(' ','T') + 'Z').toLocaleString(); } catch { return t; } }
function timeDiff(a, b) {
  try { const ms = new Date(b.replace(' ','T') + 'Z') - new Date(a.replace(' ','T') + 'Z'); const m = Math.floor(ms / 60000); return m < 60 ? m + 'm' : Math.floor(m / 60) + 'h ' + (m % 60) + 'm'; }
  catch { return '?'; }
}
function renderEntryDetail(e) {
  return '<div style="background:#1e293b;padding:8px;border-radius:4px;border-left:3px solid ' + nodeColor(e.type) + '">' +
    '<b style="color:' + nodeColor(e.type) + ';font-size:.7rem">[' + e.type + '] ID:' + e.id + '</b>' +
    '<div style="font-size:.7rem;margin:4px 0">' + esc(e.summary) + '</div>' +
    '<div style="font-size:.6rem;opacity:.7">Tier: ' + e.tier + ' | Source: ' + (e.source || 'n/a') + '</div>' +
    '<div style="font-size:.6rem;opacity:.7">Confidence: ' + (e.confidence || 1).toFixed(2) + ' | Access: ' + (e.accessCount || 0) + '</div>' +
    '<div style="font-size:.6rem;opacity:.7">Tags: ' + (e.tags || 'none') + '</div>' +
    (e.content ? '<details style="margin-top:6px"><summary style="font-size:.6rem;cursor:pointer">Content</summary>' +
      '<pre style="font-size:.55rem;white-space:pre-wrap;max-height:200px;overflow-y:auto;background:#0f172a;padding:6px;border-radius:3px;margin-top:4px">' +
      esc(e.content).substring(0, 1000) + '</pre></details>' : '') + '</div>';
}
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'sessions') loadSessions();
  if (name === 'browser') { if (!browserEntries.length) loadBrowserEntries(true); }
  if (name === 'stream') startStream();
  if (name !== 'stream') stopStream();
}
function graphSearchKey(ev) {
  if (ev.key !== 'Enter') return;
  const q = ev.target.value;
  if (!q) return;
  fetch(API + '/search?q=' + encodeURIComponent(q)).then(r => r.json()).then(data => {
    const panel = document.getElementById('graph-node-detail');
    panel.innerHTML = data.map(e =>
      '<div class="entry-item" onclick="focusEntry(' + e.id + ')"><span class="entry-type" style="color:' +
      nodeColor(e.type) + '">' + e.type + '</span><div class="entry-summary">' + esc(e.summary) + '</div></div>'
    ).join('') || '<div style="opacity:.5;font-size:.7rem">No results</div>';
  });
}
</script>
<script src="graph.js"></script>
<script src="sessions.js"></script>
<script src="session-timeline.js"></script>
<script src="session-playback.js"></script>
<script src="session-export.js"></script>
<script src="browser.js"></script>
<script src="stream.js"></script>
<script>
/* Init */
async function loadStats() {
  try {
    const r = await fetch(API + '/status'); const d = await r.json();
    document.title = 'SDLC Memory (' + d.totalEntries + ' entries)';
    const statsEl = document.getElementById('graph-stats');
    if (statsEl) {
      statsEl.innerHTML =
        '<div style="background:#334155;border-radius:4px;padding:6px;text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#38bdf8">' + (d.totalEntries || 0) + '</div><div style="font-size:.6rem;color:#94a3b8">Entries</div></div>' +
        '<div style="background:#334155;border-radius:4px;padding:6px;text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#38bdf8">' + (d.totalEdges || 0) + '</div><div style="font-size:.6rem;color:#94a3b8">Edges</div></div>' +
        '<div style="background:#334155;border-radius:4px;padding:6px;text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#38bdf8">' + (d.totalVectors || 0) + '</div><div style="font-size:.6rem;color:#94a3b8">Vectors</div></div>' +
        '<div style="background:#334155;border-radius:4px;padding:6px;text-align:center"><div style="font-size:1.2rem;font-weight:700;color:#38bdf8">' + (Object.keys(d.tierBreakdown || {}).length || 0) + '</div><div style="font-size:.6rem;color:#94a3b8">Tiers</div></div>';
    }
  } catch(e) { console.error('[stats]', e); }
  try {
    const r = await fetch(API + '/entries?limit=10&sort=created_at'); const d = await r.json();
    const recentEl = document.getElementById('graph-recent');
    if (recentEl && Array.isArray(d)) {
      recentEl.innerHTML = d.map(e =>
        '<div class="entry-item" onclick="focusEntry(' + e.id + ')"><span class="entry-type" style="color:' +
        nodeColor(e.type) + '">' + e.type + '</span><div class="entry-summary">' + esc(e.summary) + '</div></div>'
      ).join('') || '<div style="opacity:.5">No entries yet</div>';
    }
  } catch(e) {}
  try { const r = await fetch('api/health'); const h = await r.json();
    const ws = h.workspace || 'unknown';
    const el = document.getElementById('workspace-info');
    if (el) { el.textContent = '📂 ' + ws; el.title = ws; }
  } catch(e) {}
}
loadStats(); initGraph();
</script>
<script type="module">
import { initTour } from './modules/tour.js';
import { initTooltips } from './modules/tooltips.js';
import { initEmptyStates } from './modules/empty-states.js';
import { initHelpPanel } from './modules/help-panel.js';
import { initGraphAnalysis } from './modules/graph-analysis.js';
import { initRecommendations } from './modules/recommendations.js';

const page = 'graph';
initTour(page);
initTooltips(page);
initEmptyStates(page);
initHelpPanel(page);
initGraphAnalysis();
initRecommendations();
</script>
</body></html>

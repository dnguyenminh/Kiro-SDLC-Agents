name: Build Native Addons (better-sqlite3)

on:
  workflow_dispatch:
    inputs:
      better_sqlite3_version:
        description: 'better-sqlite3 version to build'
        required: true
        default: '11.7.0'
  push:
    branches: [main]
    paths:
      - 'kiro-sdlc-agents/resources/release-manifest.json'

env:
  DEFAULT_BETTER_SQLITE3_VERSION: '11.7.0'

jobs:
  # Gate job: skip entire workflow if release already exists with all binaries
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check_release.outputs.should_build }}
      version: ${{ steps.check_release.outputs.version }}
    steps:
      - name: Check if release already complete
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.better_sqlite3_version || env.DEFAULT_BETTER_SQLITE3_VERSION }}"
          TAG="better-sqlite3-v${VERSION}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Check if release with all 12 binaries already exists (3 node versions x 4 platforms)
          ASSETS=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name' 2>/dev/null || echo "")

          EXPECTED_COUNT=0
          for NODE_VER in 20 22 24; do
            for PLAT in "win32-x64" "linux-x64" "darwin-x64" "darwin-arm64"; do
              if echo "$ASSETS" | grep -q "node-v${NODE_VER}-${PLAT}.node"; then
                EXPECTED_COUNT=$((EXPECTED_COUNT + 1))
              fi
            done
          done

          if [ "$EXPECTED_COUNT" -eq 12 ]; then
            echo "✅ Release $TAG already has all 12 platform binaries. Skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🔨 Release $TAG has ${EXPECTED_COUNT}/12 binaries. Will build missing ones."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Node 20 LTS (N-API v9, MODULE_VERSION 115)
          - os: windows-latest
            platform: win32
            arch: x64
            node-version: '20'
            node-label: 'node-v20'
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-version: '20'
            node-label: 'node-v20'
          - os: macos-latest
            platform: darwin
            arch: x64
            node-version: '20'
            node-label: 'node-v20'
          - os: macos-14
            platform: darwin
            arch: arm64
            node-version: '20'
            node-label: 'node-v20'
          # Node 22 LTS (N-API v9, MODULE_VERSION 127)
          - os: windows-latest
            platform: win32
            arch: x64
            node-version: '22'
            node-label: 'node-v22'
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-version: '22'
            node-label: 'node-v22'
          - os: macos-latest
            platform: darwin
            arch: x64
            node-version: '22'
            node-label: 'node-v22'
          - os: macos-14
            platform: darwin
            arch: arm64
            node-version: '22'
            node-label: 'node-v22'
          # Node 24 (N-API v10, MODULE_VERSION 137)
          - os: windows-latest
            platform: win32
            arch: x64
            node-version: '24'
            node-label: 'node-v24'
          - os: ubuntu-latest
            platform: linux
            arch: x64
            node-version: '24'
            node-label: 'node-v24'
          - os: macos-latest
            platform: darwin
            arch: x64
            node-version: '24'
            node-label: 'node-v24'
          - os: macos-14
            platform: darwin
            arch: arm64
            node-version: '24'
            node-label: 'node-v24'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print Node info
        run: |
          node -e "console.log('Node:', process.version, '| N-API:', process.versions.napi, '| MODULE_VERSION:', process.config.variables.node_module_version)"

      - name: Install better-sqlite3
        run: |
          mkdir build-temp
          cd build-temp
          npm init -y
          npm install better-sqlite3@${{ needs.check.outputs.version }}

      - name: Locate and rename binary
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          NODE_LABEL="${{ matrix.node-label }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          FILENAME="better-sqlite3-v${VERSION}-${NODE_LABEL}-${PLATFORM}-${ARCH}.node"

          # Find the compiled .node file
          NODE_FILE=$(find build-temp/node_modules/better-sqlite3 -name "better_sqlite3.node" -o -name "*.node" | head -1)

          if [ -z "$NODE_FILE" ]; then
            echo "ERROR: No .node file found!"
            find build-temp/node_modules/better-sqlite3 -type f -name "*.node"
            exit 1
          fi

          echo "Found: $NODE_FILE"
          cp "$NODE_FILE" "$FILENAME"

          # Compute SHA-256 checksum
          if [[ "$PLATFORM" == "darwin" ]]; then
            shasum -a 256 "$FILENAME" | tee "${FILENAME}.sha256"
          else
            sha256sum "$FILENAME" | tee "${FILENAME}.sha256"
          fi

          echo "Binary size: $(wc -c < "$FILENAME") bytes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.node-label }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            *.node
            *.sha256
          retention-days: 90

  release:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la *.node *.sha256

      - name: Create checksums.txt
        run: |
          cat *.sha256 > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: better-sqlite3-v${{ needs.check.outputs.version }}
          name: "better-sqlite3 v${{ needs.check.outputs.version }} Prebuilt Binaries"
          body: |
            Prebuilt `better-sqlite3` native binaries for the kiro-sdlc-agents extension.

            **Version:** ${{ needs.check.outputs.version }}
            **Node versions:** 20 (LTS), 22 (LTS), 24
            **Platforms:** win32-x64, linux-x64, darwin-x64, darwin-arm64

            ### Naming scheme
            `better-sqlite3-v{version}-node-v{major}-{platform}-{arch}.node`

            ### Node to N-API to MODULE_VERSION mapping
            | Node | N-API | MODULE_VERSION |
            |------|-------|----------------|
            | 20   | v9    | 115            |
            | 22   | v9    | 127            |
            | 24   | v10   | 137            |

            These binaries are automatically downloaded by the extension on first activation.
          files: |
            *.node
            checksums.txt
          draft: false
          prerelease: false

  update-manifest:
    needs: [check, build, release]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Update release-manifest.json
        shell: bash
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"

          # Build JSON entries for all binaries
          BINARIES=""
          for NODE_VER in 20 22 24; do
            for PLAT in "win32-x64" "linux-x64" "darwin-x64" "darwin-arm64"; do
              KEY="node-v${NODE_VER}-${PLAT}"
              FILENAME="better-sqlite3-v${VERSION}-${KEY}.node"

              if [ -f "$FILENAME" ]; then
                HASH=$(awk '{print $1}' "${FILENAME}.sha256")
                SIZE=$(wc -c < "$FILENAME" | tr -d ' ')
              else
                HASH="placeholder"
                SIZE=5242880
              fi

              URL="https://github.com/${REPO}/releases/download/better-sqlite3-v${VERSION}/${FILENAME}"

              if [ -n "$BINARIES" ]; then
                BINARIES="${BINARIES},"
              fi
              BINARIES="${BINARIES}
        \"${KEY}\": {
          \"url\": \"${URL}\",
          \"sha256\": \"${HASH}\",
          \"size\": ${SIZE}
        }"
            done
          done

          cat > kiro-sdlc-agents/resources/release-manifest.json << EOF
          {
            "better-sqlite3": {
              "version": "${VERSION}",
              "releaseUrl": "https://github.com/${REPO}/releases/tag/better-sqlite3-v${VERSION}",
              "binaries": {${BINARIES}
              }
            }
          }
          EOF

          echo "=== Updated release-manifest.json ==="
          cat kiro-sdlc-agents/resources/release-manifest.json

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kiro-sdlc-agents/resources/release-manifest.json
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update release-manifest.json with checksums [skip ci]"
          git push

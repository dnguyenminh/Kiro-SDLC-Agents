name: Publish Extension

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - vscode-only
          - openvsx-only

defaults:
  run:
    working-directory: kiro-sdlc-agents

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate checksums manifest
        run: npm run gen-checksums

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: 'kiro-sdlc-agents/*.vsix'

  publish-vscode:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'vscode-only'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}
        working-directory: .

  publish-openvsx:
    needs: build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'openvsx-only'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish to Open VSX (Kiro IDE)
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
        working-directory: .

name: Publish — MCP Servers + Extension

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mcp-only
          - extension-only

permissions:
  contents: write
  packages: write

jobs:
  # --- Version gate: extract version from tag ---
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      node_ver: ${{ steps.versions.outputs.node_ver }}
      py_ver: ${{ steps.versions.outputs.py_ver }}
      kt_ver: ${{ steps.versions.outputs.kt_ver }}
      ext_ver: ${{ steps.versions.outputs.ext_ver }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(jq -r .version mcp-code-intelligence-nodejs/package.json)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Tag version: $VERSION"

      - name: Read module versions
        id: versions
        run: |
          NODE_VER=$(jq -r .version mcp-code-intelligence-nodejs/package.json)
          PY_VER=$(grep -oP 'version = "\K[^"]+' mcp-code-intelligence-python/pyproject.toml)
          KT_VER=$(grep -oP 'version = "\K[^"]+' mcp-code-intelligence-kotlin/build.gradle.kts)
          EXT_VER=$(jq -r .version kiro-sdlc-agents/package.json)

          echo "node_ver=$NODE_VER" >> "$GITHUB_OUTPUT"
          echo "py_ver=$PY_VER" >> "$GITHUB_OUTPUT"
          echo "kt_ver=$KT_VER" >> "$GITHUB_OUTPUT"
          echo "ext_ver=$EXT_VER" >> "$GITHUB_OUTPUT"

          echo "Node.js: $NODE_VER | Python: $PY_VER | Kotlin: $KT_VER | Extension: $EXT_VER"

  # --- Build + Publish MCP Node.js to npm ---
  publish-nodejs:
    needs: version-check
    if: github.event.inputs.target != 'extension-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: mcp-code-intelligence-nodejs
      - run: npm run build
        working-directory: mcp-code-intelligence-nodejs
      - name: Publish to npm (skip if version exists)
        run: npm publish --access public || echo "⚠️ Version already published, skipping"
        working-directory: mcp-code-intelligence-nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Build + Publish MCP Python to PyPI ---
  publish-python:
    needs: version-check
    if: github.event.inputs.target != 'extension-only'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - name: Bundle viewer static files
        run: python copy_viewer.py
        working-directory: mcp-code-intelligence-python
      - run: python -m build
        working-directory: mcp-code-intelligence-python
      - name: Publish to PyPI (skip if version exists)
        run: twine upload dist/* --skip-existing
        working-directory: mcp-code-intelligence-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # --- Build Kotlin JAR + Publish to GitHub Packages + Upload to GitHub Release ---
  publish-kotlin:
    needs: version-check
    if: github.event.inputs.target != 'extension-only'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - run: chmod +x gradlew && ./gradlew shadowJar
        working-directory: mcp-code-intelligence-kotlin
      - name: Publish to GitHub Packages (skip if version exists)
        run: ./gradlew publish || echo "⚠️ Version already published, skipping"
        working-directory: mcp-code-intelligence-kotlin
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mcp-code-intelligence-kotlin/build/libs/mcp-code-intelligence-*.jar

  # --- Build + Publish VS Code Extension ---
  publish-extension:
    needs: [version-check, publish-nodejs, publish-python, publish-kotlin]
    if: |
      always() &&
      (github.event.inputs.target != 'mcp-only')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kiro-sdlc-agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Build MCP server
        working-directory: mcp-code-intelligence-nodejs
        run: |
          npm ci
          npm run build
      - name: Copy MCP server dist to extension
        run: |
          rm -rf kiro-sdlc-agents/mcp-server
          cp -r mcp-code-intelligence-nodejs/dist kiro-sdlc-agents/mcp-server
          cp -r mcp-code-intelligence-nodejs/node_modules kiro-sdlc-agents/mcp-server/node_modules
        working-directory: .
      - run: npm run copy-resources
      - run: npm run gen-checksums
      - run: npm run esbuild-production
      - run: npm run esbuild-mcp
      - run: npx vsce package --no-dependencies

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kiro-sdlc-agents/*.vsix

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath *.vsix -p ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      - name: Publish to Open VSX (Kiro IDE)
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
        continue-on-error: true

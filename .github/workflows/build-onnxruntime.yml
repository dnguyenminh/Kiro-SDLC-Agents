name: Build ONNX Runtime Native (onnxruntime-node)

on:
  workflow_dispatch:
    inputs:
      onnxruntime_version:
        description: 'onnxruntime-node version to package'
        required: true
        default: '1.22.0'
      node_version:
        description: 'Node.js major version'
        required: true
        default: '22'
        type: choice
        options:
          - '20'
          - '22'
          - '24'
          - '25'
          - 'all'
      force_rebuild:
        description: 'Force rebuild even if binary exists'
        required: false
        default: 'false'
        type: boolean
  workflow_call:
    inputs:
      onnxruntime_version:
        description: 'onnxruntime-node version to package'
        required: true
        type: string
      node_version:
        description: 'Node.js major version'
        required: true
        type: string
      force_rebuild:
        description: 'Force rebuild'
        required: false
        type: boolean
        default: false

env:
  DEFAULT_VERSION: '1.22.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setup.outputs.version }}
      matrix: ${{ steps.setup.outputs.matrix }}
    steps:
      - name: Setup build matrix
        id: setup
        run: |
          VERSION="${{ inputs.onnxruntime_version || '1.22.0' }}"
          NODE_INPUT="${{ inputs.node_version || '22' }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # onnxruntime-node uses N-API, so one binary per platform (not per Node version)
          # But we still test with specific Node versions
          if [ "$NODE_INPUT" = "all" ]; then
            NODES="22"
          else
            NODES="$NODE_INPUT"
          fi

          MATRIX="{\"include\":["
          FIRST=true
          for NV in $NODES; do
            for ENTRY in "windows-latest,win32,x64" "ubuntu-latest,linux,x64" "macos-13,darwin,x64" "macos-14,darwin,arm64"; do
              OS=$(echo $ENTRY | cut -d, -f1)
              PLAT=$(echo $ENTRY | cut -d, -f2)
              ARCH=$(echo $ENTRY | cut -d, -f3)
              if [ "$FIRST" = true ]; then FIRST=false; else MATRIX="${MATRIX},"; fi
              MATRIX="${MATRIX}{\"os\":\"${OS}\",\"platform\":\"${PLAT}\",\"arch\":\"${ARCH}\",\"node_version\":\"${NV}\"}"
            done
          done
          MATRIX="${MATRIX}]}"
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Check if binary already exists in release
        id: check_existing
        if: inputs.force_rebuild != true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="onnxruntime-node-v${VERSION}"
          FILENAME="onnxruntime-node-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz"

          # Check if release and asset exist
          if gh release view "$TAG" --json assets -q ".assets[].name" 2>/dev/null | grep -qF "$FILENAME"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ $FILENAME already exists in release $TAG — skipping build"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔨 $FILENAME not found — will build"
          fi

      - name: Print Node info
        if: steps.check_existing.outputs.skip != 'true'
        shell: bash
        run: |
          echo "Node: $(node --version)"
          echo "Platform: ${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Install onnxruntime-node
        if: steps.check_existing.outputs.skip != 'true'
        shell: bash
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: '0'
        run: |
          mkdir build-temp && cd build-temp
          npm init -y
          # Try normal install first; if GPU download fails, retry with --ignore-scripts
          npm install "onnxruntime-node@${{ needs.prepare.outputs.version }}" || \
            npm install "onnxruntime-node@${{ needs.prepare.outputs.version }}" --ignore-scripts

      - name: Verify native binaries exist
        if: steps.check_existing.outputs.skip != 'true'
        shell: bash
        run: |
          ORT_DIR="build-temp/node_modules/onnxruntime-node"
          if [ -d "$ORT_DIR/bin" ]; then
            echo "✅ Native binaries found:"
            ls -la "$ORT_DIR/bin/" || true
            find "$ORT_DIR/bin" -type f | head -20
          else
            echo "⚠️ No bin/ directory — checking for alternative locations..."
            find "$ORT_DIR" -name "*.so" -o -name "*.dylib" -o -name "*.dll" 2>/dev/null | head -20
          fi

      - name: Verify architecture
        if: steps.check_existing.outputs.skip != 'true'
        shell: bash
        run: |
          # Find native binary
          ORT_DIR="build-temp/node_modules/onnxruntime-node"
          NATIVE_FILE=$(find "$ORT_DIR/bin" -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" \) 2>/dev/null | head -1)

          if [ -z "$NATIVE_FILE" ]; then
            echo "⚠️ No native binary found for verification — skipping"
            exit 0
          fi

          if command -v file &>/dev/null; then
            FILE_INFO=$(file "$NATIVE_FILE")
            echo "File info: $FILE_INFO"

            EXPECTED_ARCH="${{ matrix.arch }}"
            if [ "$EXPECTED_ARCH" = "x64" ]; then
              if echo "$FILE_INFO" | grep -qi "arm64\|aarch64"; then
                echo "❌ ERROR: Binary is arm64 but expected x64!"
                exit 1
              fi
              echo "✅ Architecture verified: x64"
            elif [ "$EXPECTED_ARCH" = "arm64" ]; then
              if echo "$FILE_INFO" | grep -qi "x86_64\|x86-64"; then
                echo "❌ ERROR: Binary is x64 but expected arm64!"
                exit 1
              fi
              echo "✅ Architecture verified: arm64"
            fi
          else
            echo "⚠️ 'file' command not available — skipping arch verification"
          fi

      - name: Package native binaries
        if: steps.check_existing.outputs.skip != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          ARCHIVE_NAME="onnxruntime-node-v${VERSION}-${PLATFORM}-${ARCH}.tar.gz"

          # Find the native binary directory
          ORT_DIR="build-temp/node_modules/onnxruntime-node"
          
          if [ ! -d "$ORT_DIR" ]; then
            echo "ERROR: onnxruntime-node not found"
            ls build-temp/node_modules/
            exit 1
          fi

          # Create a clean package with only what's needed at runtime:
          # - bin/ (native .dll/.so/.dylib files)
          # - dist/ (JS wrappers)
          # - package.json
          mkdir -p package/onnxruntime-node
          
          # Copy native binaries (the key part)
          if [ -d "$ORT_DIR/bin" ]; then
            cp -r "$ORT_DIR/bin" package/onnxruntime-node/
          fi
          
          # Copy JS distribution files
          if [ -d "$ORT_DIR/dist" ]; then
            cp -r "$ORT_DIR/dist" package/onnxruntime-node/
          fi
          
          # Copy package.json for require() resolution
          cp "$ORT_DIR/package.json" package/onnxruntime-node/
          
          # Also include onnxruntime-common (peer dependency)
          ORT_COMMON="build-temp/node_modules/onnxruntime-common"
          if [ -d "$ORT_COMMON" ]; then
            cp -r "$ORT_COMMON" package/onnxruntime-common
          fi

          # Create tarball
          tar -czf "$ARCHIVE_NAME" -C package .
          
          # Generate checksum
          sha256sum "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256" 2>/dev/null || shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          
          # Print info
          echo "Archive: $ARCHIVE_NAME ($(wc -c < "$ARCHIVE_NAME") bytes)"
          echo "Contents:"
          tar -tzf "$ARCHIVE_NAME" | head -30 || true
          cat "${ARCHIVE_NAME}.sha256"

      - uses: actions/upload-artifact@v4
        if: steps.check_existing.outputs.skip != 'true'
        with:
          name: onnxruntime-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.sha256
          retention-days: 90

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: onnxruntime-*
          merge-multiple: true
        continue-on-error: true  # No artifacts if all skipped

      - name: Check for new binaries
        id: check_binaries
        run: |
          if ls *.tar.gz 1>/dev/null 2>&1; then
            echo "has_binaries=true" >> $GITHUB_OUTPUT
            echo "Found $(ls *.tar.gz | wc -l) new archives to upload"
            ls -la *.tar.gz
          else
            echo "has_binaries=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new binaries to upload — all builds were skipped"
          fi

      - name: Upload to GitHub Release
        if: steps.check_binaries.outputs.has_binaries == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="onnxruntime-node-v${VERSION}"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "onnxruntime-node v${VERSION} Prebuilt Binaries" \
              --notes "Prebuilt native binaries for onnxruntime-node on win32-x64, linux-x64, darwin-x64, darwin-arm64. Extract to globalStorage for use by Kiro SDLC extension."

          for f in *.tar.gz; do
            gh release upload "$TAG" "$f" --clobber
          done

          echo "✅ Uploaded $(ls *.tar.gz | wc -l) archives to release $TAG"

name: Build ONNX Runtime Native (onnxruntime-node)

on:
  workflow_dispatch:
    inputs:
      onnxruntime_version:
        description: 'onnxruntime-node version to package'
        required: true
        default: '1.22.0'
      node_version:
        description: 'Node.js major version'
        required: true
        default: '22'
        type: choice
        options:
          - '20'
          - '22'
          - '24'
          - '25'
          - 'all'

env:
  DEFAULT_VERSION: '1.22.0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.setup.outputs.version }}
      matrix: ${{ steps.setup.outputs.matrix }}
    steps:
      - name: Setup build matrix
        id: setup
        run: |
          VERSION="${{ inputs.onnxruntime_version || '1.22.0' }}"
          NODE_INPUT="${{ inputs.node_version || '22' }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # onnxruntime-node uses N-API, so one binary per platform (not per Node version)
          # But we still test with specific Node versions
          if [ "$NODE_INPUT" = "all" ]; then
            NODES="22"
          else
            NODES="$NODE_INPUT"
          fi

          MATRIX="{\"include\":["
          FIRST=true
          for NV in $NODES; do
            for ENTRY in "windows-latest,win32,x64" "ubuntu-latest,linux,x64" "macos-latest,darwin,x64" "macos-14,darwin,arm64"; do
              OS=$(echo $ENTRY | cut -d, -f1)
              PLAT=$(echo $ENTRY | cut -d, -f2)
              ARCH=$(echo $ENTRY | cut -d, -f3)
              if [ "$FIRST" = true ]; then FIRST=false; else MATRIX="${MATRIX},"; fi
              MATRIX="${MATRIX}{\"os\":\"${OS}\",\"platform\":\"${PLAT}\",\"arch\":\"${ARCH}\",\"node_version\":\"${NV}\"}"
            done
          done
          MATRIX="${MATRIX}]}"
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}

      - name: Print Node info
        shell: bash
        run: |
          echo "Node: $(node --version)"
          echo "Platform: ${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Install onnxruntime-node
        shell: bash
        env:
          ONNXRUNTIME_NODE_INSTALL_CUDA: '0'
        run: |
          mkdir build-temp && cd build-temp
          npm init -y
          # Try normal install first; if GPU download fails, retry with --ignore-scripts
          npm install "onnxruntime-node@${{ needs.prepare.outputs.version }}" || \
            npm install "onnxruntime-node@${{ needs.prepare.outputs.version }}" --ignore-scripts

      - name: Verify native binaries exist
        shell: bash
        run: |
          ORT_DIR="build-temp/node_modules/onnxruntime-node"
          if [ -d "$ORT_DIR/bin" ]; then
            echo "✅ Native binaries found:"
            ls -la "$ORT_DIR/bin/" || true
            find "$ORT_DIR/bin" -type f | head -20
          else
            echo "⚠️ No bin/ directory — checking for alternative locations..."
            find "$ORT_DIR" -name "*.so" -o -name "*.dylib" -o -name "*.dll" 2>/dev/null | head -20
          fi

      - name: Package native binaries
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          ARCH="${{ matrix.arch }}"
          ARCHIVE_NAME="onnxruntime-node-v${VERSION}-${PLATFORM}-${ARCH}.tar.gz"

          # Find the native binary directory
          ORT_DIR="build-temp/node_modules/onnxruntime-node"
          
          if [ ! -d "$ORT_DIR" ]; then
            echo "ERROR: onnxruntime-node not found"
            ls build-temp/node_modules/
            exit 1
          fi

          # Create a clean package with only what's needed at runtime:
          # - bin/ (native .dll/.so/.dylib files)
          # - dist/ (JS wrappers)
          # - package.json
          mkdir -p package/onnxruntime-node
          
          # Copy native binaries (the key part)
          if [ -d "$ORT_DIR/bin" ]; then
            cp -r "$ORT_DIR/bin" package/onnxruntime-node/
          fi
          
          # Copy JS distribution files
          if [ -d "$ORT_DIR/dist" ]; then
            cp -r "$ORT_DIR/dist" package/onnxruntime-node/
          fi
          
          # Copy package.json for require() resolution
          cp "$ORT_DIR/package.json" package/onnxruntime-node/
          
          # Also include onnxruntime-common (peer dependency)
          ORT_COMMON="build-temp/node_modules/onnxruntime-common"
          if [ -d "$ORT_COMMON" ]; then
            cp -r "$ORT_COMMON" package/onnxruntime-common
          fi

          # Create tarball
          tar -czf "$ARCHIVE_NAME" -C package .
          
          # Generate checksum
          sha256sum "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256" 2>/dev/null || shasum -a 256 "$ARCHIVE_NAME" > "${ARCHIVE_NAME}.sha256"
          
          # Print info
          echo "Archive: $ARCHIVE_NAME ($(wc -c < "$ARCHIVE_NAME") bytes)"
          echo "Contents:"
          tar -tzf "$ARCHIVE_NAME" | head -30 || true
          cat "${ARCHIVE_NAME}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            *.tar.gz
            *.sha256
          retention-days: 90

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: onnxruntime-*
          merge-multiple: true

      - name: List archives
        run: ls -la *.tar.gz *.sha256

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="onnxruntime-node-v${VERSION}"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "onnxruntime-node v${VERSION} Prebuilt Binaries" \
              --notes "Prebuilt native binaries for onnxruntime-node on win32-x64, linux-x64, darwin-x64, darwin-arm64. Extract to globalStorage for use by Kiro SDLC extension."

          for f in *.tar.gz; do
            gh release upload "$TAG" "$f" --clobber
          done

          echo "Uploaded $(ls *.tar.gz | wc -l) archives to release $TAG"

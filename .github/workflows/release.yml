name: Release — Build & Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  nodejs-mcp:
    name: Publish Node.js MCP to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
        working-directory: mcp-code-intelligence-nodejs
      - run: npm run build
        working-directory: mcp-code-intelligence-nodejs
      - run: npm publish --access public
        working-directory: mcp-code-intelligence-nodejs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python-mcp:
    name: Publish Python MCP to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build twine
      - run: python -m build
        working-directory: mcp-code-intelligence-python
      - run: twine upload dist/*
        working-directory: mcp-code-intelligence-python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  kotlin-mcp:
    name: Build Kotlin JAR & Upload to GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - run: chmod +x gradlew && ./gradlew shadowJar
        working-directory: mcp-code-intelligence-kotlin
      - name: Upload JAR to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mcp-code-intelligence-kotlin/build/libs/mcp-code-intelligence-0.1.0.jar

  extension:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: [nodejs-mcp, python-mcp, kotlin-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: kiro-sdlc-agents
      - run: npx vsce package
        working-directory: kiro-sdlc-agents
      - name: Upload VSIX to Release
        uses: softprops/action-gh-release@v2
        with:
          files: kiro-sdlc-agents/*.vsix
      - name: Publish to VS Code Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}
        working-directory: kiro-sdlc-agents
        continue-on-error: true

name: CI — Compile & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  nodejs-mcp:
    name: Node.js MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: mcp-code-intelligence-nodejs
      - run: npm run build
        working-directory: mcp-code-intelligence-nodejs

  kotlin-mcp:
    name: Kotlin MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
      - run: chmod +x gradlew && ./gradlew shadowJar
        working-directory: mcp-code-intelligence-kotlin

  python-mcp:
    name: Python MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -c "import ast; ast.parse(open('src/mcp_code_intel/server.py').read())"
        working-directory: mcp-code-intelligence-python
      - run: python -m pytest tests/ -v --tb=short
        working-directory: mcp-code-intelligence-python
        continue-on-error: true

  extension:
    name: VS Code Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: kiro-sdlc-agents
      - run: npm ci
        working-directory: mcp-code-intelligence-nodejs
      - run: npm run build
        working-directory: mcp-code-intelligence-nodejs
      - name: Copy MCP server dist to extension
        run: |
          cp -r mcp-code-intelligence-nodejs/dist/* kiro-sdlc-agents/mcp-server/
          cp -r mcp-code-intelligence-nodejs/node_modules kiro-sdlc-agents/mcp-server/node_modules
      - run: npm run esbuild-production
        working-directory: kiro-sdlc-agents
      - run: npm run esbuild-mcp
        working-directory: kiro-sdlc-agents
